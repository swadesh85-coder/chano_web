<section class="explorer-screen" role="main" aria-label="Vault explorer">
  <header class="explorer-header">
    <h1 class="explorer-title">Chano</h1>
    <p class="explorer-subtitle">Your vault</p>
  </header>

  @if (tree().length === 0) {
    <div class="empty-state">
      <p class="empty-text">No items in vault</p>
    </div>
  } @else {
    <div class="tree-container" role="tree">
      <ng-container
        *ngTemplateOutlet="nodeList; context: { $implicit: tree(), depth: 0 }"
      ></ng-container>
    </div>
  }
</section>

<ng-template #nodeList let-nodes let-depth="depth">
  @for (node of nodes; track node.id) {
    <div class="tree-node" role="treeitem">
      <div
        [class]="'node-row node-row--' + node.type"
        [style.padding-left.rem]="0.75 + depth * 1.25"
      >
        <button
          type="button"
          class="node-toggle"
          (click)="toggle(node.id)"
          [attr.aria-expanded]="node.children.length ? isExpanded(node.id) : null"
        >
          <span
            class="node-chevron"
            [class.node-chevron--open]="isExpanded(node.id)"
            [class.node-chevron--hidden]="!node.children.length"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </span>
          <span
            class="node-type-icon"
            [class]="'node-type-icon node-type-icon--' + node.type"
          ></span>
          <span class="node-name">{{ node.name }}</span>
        </button>
        <span class="node-actions">
          @if (node.type === 'folder') {
            <span class="node-action-wrap">
              <button
                type="button"
                class="node-action-button"
                (click)="promptCreateThread(node.id, $event)"
                [disabled]="isCreateThreadDisabled()"
                aria-label="Create thread"
              >
                New Thread
              </button>
            </span>
          }
          <span class="node-action-wrap">
            <button
              type="button"
              class="node-action-button"
              (click)="promptRenameEntity(node, $event)"
              [disabled]="isActionDisabled(node)"
              aria-label="Rename item"
            >
              Rename
            </button>
          </span>
          @if (node.type === 'thread' || node.type === 'record') {
            <span class="node-action-wrap">
              <button
                type="button"
                class="node-action-button"
                (click)="promptMoveEntity(node, $event)"
                [disabled]="isActionDisabled(node)"
                aria-label="Move item"
              >
                Move
              </button>
            </span>
          }
          <span class="node-action-wrap">
            <button
              type="button"
              class="node-action-button node-action-button--danger"
              (click)="triggerSoftDelete(node, $event)"
              [disabled]="isActionDisabled(node)"
              aria-label="Delete item"
            >
              Delete
            </button>
          </span>
        </span>
      </div>

      @if (node.children.length && isExpanded(node.id)) {
        <div class="node-children" role="group">
          <ng-container
            *ngTemplateOutlet="
              nodeList;
              context: { $implicit: node.children, depth: depth + 1 }
            "
          ></ng-container>
        </div>
      }
    </div>
  }
</ng-template>
