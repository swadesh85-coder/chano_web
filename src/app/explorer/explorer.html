<section class="explorer-screen" role="main" aria-label="Vault explorer">
  <header class="explorer-header">
    <h1 class="explorer-title">Chano</h1>
    <p class="explorer-subtitle">Your vault</p>
  </header>

  @if (tree().length === 0) {
    <div class="empty-state">
      <p class="empty-text">No items in vault</p>
    </div>
  } @else {
    <div class="tree-container" role="tree">
      <ng-container
        *ngTemplateOutlet="nodeList; context: { $implicit: tree(), depth: 0 }"
      ></ng-container>
    </div>
  }
</section>

<ng-template #nodeList let-nodes let-depth="depth">
  @for (node of nodes; track node.id) {
    <div class="tree-node" role="treeitem">
      <button
        [class]="'node-row node-row--' + node.type"
        [style.padding-left.rem]="0.75 + depth * 1.25"
        (click)="toggle(node.id)"
        [attr.aria-expanded]="node.children.length ? isExpanded(node.id) : null"
      >
        <span
          class="node-chevron"
          [class.node-chevron--open]="isExpanded(node.id)"
          [class.node-chevron--hidden]="!node.children.length"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </span>
        <span
          class="node-type-icon"
          [class]="'node-type-icon node-type-icon--' + node.type"
        ></span>
        <span class="node-name">{{ node.name }}</span>
      </button>

      @if (node.children.length && isExpanded(node.id)) {
        <div class="node-children" role="group">
          <ng-container
            *ngTemplateOutlet="
              nodeList;
              context: { $implicit: node.children, depth: depth + 1 }
            "
          ></ng-container>
        </div>
      }
    </div>
  }
</ng-template>
